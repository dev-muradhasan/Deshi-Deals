<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deshi Deals</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');

    .work-sans-font{
        font-family: "Work Sans", sans-serif;
    }
</style>

<body class="work-sans-font">
    <header class="shadow-sm">
        <nav class="flex justify-center items-center gap-[9px] py-[14px]">
            <div class="w-[78px] h-[78px]">
                <img src="./assets/logo.png" alt="">
            </div>
            <div class="text-[#E71580]">
                <h2 class="text-5xl">
                    <span>Deshi</span>
                    <span class="font-bold">Deals</span>
                </h2>
                <p class="text-xl text-[#797075]">Cheap Price , Best Quality</p>
            </div>
        </nav>
    </header>

    <main>
        <!-- hero section -->
         <section class="mt-1 pt-24 bg-gradient-to-t from-[#F6DDEA] to-[#FFFFFF]">
            <div class="font-bold text-5xl text-center">
                <h1 class="text-[#111111]">Purchase TK 200 or above & get</h1>
                <h1 class="text-[#E527B2]">20% off</h1>
            </div>
            <div class="flex justify-center gap-7 mt-10">
                <button class="btn btn-outline btn-secondary border-[#E527B2] hover:bg-[#E527B2]">Use Promo Code</button>
                <button class="btn btn-secondary bg-[#E527B2] hover:bg-white hover:text-[#E527B2] hover:border-[#E527B2]">SELL200</button>
            </div>
            <div class="">
                <img class="max-w-[700px] block mx-auto" src="./assets/hero-bg.png" alt="">
            </div>
         </section>

         <!--  -->
    </main>
</body>

</html>
